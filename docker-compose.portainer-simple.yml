version: '3.8'

services:
  dona-nice-app:
    build:
      context: https://github.com/seu-usuario/projeto-dn-app.git
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://seu-dominio.com.br
    volumes:
      - dona-nice-data:/app/data
      - dona-nice-logs:/var/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  dona-nice-data:
    driver: local
  dona-nice-logs:
    driver: local

networks:
  default:
    name: dona-nice-network
