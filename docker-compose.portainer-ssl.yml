version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.le.acme.email=seu-email@exemplo.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - web
    restart: unless-stopped

  dona-nice-app:
    image: seudockerid/dona-nice-app:latest
    container_name: dona-nice-app
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=https://donanice.fluxora.space
    volumes:
      - dona-nice-data:/app/data
      - dona-nice-logs:/var/log
    labels:
      - traefik.enable=true
      - traefik.http.routers.dona-nice.rule=Host(`donanice.fluxora.space`)
      - traefik.http.routers.dona-nice.entrypoints=websecure
      - traefik.http.routers.dona-nice.tls=true
      - traefik.http.routers.dona-nice.tls.certresolver=le
      - traefik.http.services.dona-nice.loadbalancer.server.port=3001
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  web:
    name: web

volumes:
  traefik_letsencrypt:
  dona-nice-data:
  dona-nice-logs:
