version: '3.8'
services:
  backend:
    build: ./backend
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
    command: sh -c "npm install || true && npm run dev"

  frontend:
    build: ./frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install || true && npm run dev"
