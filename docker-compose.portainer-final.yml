version: "3.8"

services:

  dona-nice-app:
    build:
      context: https://github.com/mathewsfs/dona_nice.git
      dockerfile: backend/Dockerfile
    container_name: dona-nice-app
    restart: unless-stopped

    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      TRAEFIK_ACME_EMAIL: ${TRAEFIK_ACME_EMAIL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      TZ: ${TZ}

    volumes:
      - dona-nice-data:/app/data
      - dona-nice-logs:/app/logs

    # Temporariamente desabilitar health check para estabilidade
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -q --spider http://localhost:${PORT}/api/health || exit 1"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 40s

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dona-nice.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.dona-nice.entrypoints=websecure"
      - "traefik.http.routers.dona-nice.tls=true"
      - "traefik.http.routers.dona-nice.tls.certresolver=le"
      - "traefik.http.services.dona-nice.loadbalancer.server.port=${PORT}"

    networks:
      - fluxora_net


  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-dona-nice
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60
    networks:
      - fluxora_net


networks:
  fluxora_net:
    external: true


volumes:
  dona-nice-data:
  dona-nice-logs:
