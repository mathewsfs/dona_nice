name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build image
        run: |
          docker build -f backend/Dockerfile -t mathewsfs/dona-nice:latest .

      - name: Push image
        run: |
          docker push mathewsfs/dona-nice:latest